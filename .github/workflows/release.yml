name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          cp build/MP3Player release/mp3player-linux-x86_64
          chmod +x release/mp3player-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: release/mp3player-linux-x86_64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install gcc sdl2

      - name: Find GCC version
        id: gcc
        run: |
          GXX=$(ls /opt/homebrew/bin/g++-* /usr/local/bin/g++-* 2>/dev/null | sort -V | tail -1)
          echo "compiler=$GXX" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=${{ steps.gcc.outputs.compiler }}
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p release
          cp build/MP3Player release/mp3player-macos-arm64
          chmod +x release/mp3player-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: release/mp3player-macos-arm64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux-binary/mp3player-linux-x86_64
            artifacts/macos-binary/mp3player-macos-arm64

  update-aur:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/minimalist-mp3-player.git aur

      - name: Update PKGBUILD
        working-directory: aur
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Generate .SRCINFO
        working-directory: aur
        run: |
          sudo pacman-key --init 2>/dev/null || true
          docker run --rm -v "$PWD":/pkg -w /pkg archlinux:latest bash -c \
            "pacman -Sy --noconfirm base-devel && chown -R nobody:nobody . && sudo -u nobody makepkg --printsrcinfo > .SRCINFO"

      - name: Push to AUR
        working-directory: aur
        run: |
          git config user.name "Ardet696"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${{ steps.version.outputs.version }}"
          git push
